[project]
name = "course-management-platform"
version = "0.1.0"
description = "A Django-based course management platform"
requires-python = ">=3.13"

dependencies = [
    "django",
    "django-allauth[slack]",
    "requests",
    "pyjwt",
    "cryptography",
    "dj-database-url",
    "whitenoise",
    "psycopg2-binary",
    "gunicorn",
    "python-json-logger",
    "django-unfold",
    "django-loginas",
    "mistune>=3.1.3",
    "bleach>=6.2.0",
    "boto3>=1.43.33",
]

[dependency-groups]
dev = [
    "ipython",
    "pytest-django",
    "pytest",
    "jupyter",
    "pandas",
    "tqdm",
    "playwright>=1.58.0",
    "pyrefly>=1.1.1",
]


[tool.ruff]
line-length = 72
# Exploratory notebooks and auto-generated migrations are not linted.
extend-exclude = ["notebooks", "**/migrations"]

[tool.ruff.lint.per-file-ignores]
# Utility scripts call django.setup() before importing project modules.
"scripts/*.py" = ["E402"]

[tool.pyrefly]
# Notebooks are exploratory artifacts; type-check maintained Python modules.
preset = "basic"
project-includes = ["**/*.py"]
project-excludes = ["notebooks/**"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "course_management.settings"
python_files = ["test_*.py"]

testpaths = [
    "courses/tests",
    "data/tests",
    "cadmin/tests",
]

[tool.uv]
exclude-newer = "7 days"
