<div class="question">
    <label for="faq_contribution_url" class="question-text form-label-with-help font-medium">
        <span>FAQ contribution PR or issue URL (<a href="https://datatalks.club/docs/courses/faq/"
               target="_blank"
               rel="noopener noreferrer">FAQ docs</a>, <span class="app-muted">optional</span>)</span>
        <span class="form-help-icon app-muted"
              role="button"
              tabindex="0"
              aria-label="How to submit an FAQ contribution"
              aria-expanded="false"
              data-form-help="Create a GitHub issue or pull request in the FAQ repo for your contribution, then paste that issue or PR URL here."><i class="fas fa-question-circle" aria-hidden="true"></i></span>
    </label>
    {# Mirrors clean_faq_contribution_url, which is the enforced check. #}
    <input type="url"
           class="form-control mt-2 {% if error_fields and 'faq_contribution_url' in error_fields %}is-invalid{% endif %}"
           name="faq_contribution_url"
           id="faq_contribution_url"
           pattern="https://github\.com/[Dd]ata[Tt]alks[Cc]lub/faq/(issues|pull)/[0-9]+/?([?#].*)?"
           placeholder="https://github.com/DataTalksClub/faq/issues/281"
           title="Paste a DataTalksClub/faq issue or pull request URL."
           value="{{ submission.faq_contribution_url|default:'' }}"
           {% if disabled or not is_authenticated %}disabled{% endif %} />
</div>
