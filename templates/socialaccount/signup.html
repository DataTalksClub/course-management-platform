{% extends 'base.html' %}

{% block title %}Welcome - Course Management{% endblock %}

{% block content %}
<section class="mx-auto max-w-lg overflow-hidden rounded-md border app-border app-surface shadow-subtle">
    <div class="border-b app-border app-surface-muted px-5 py-4 text-center">
        <h1 class="text-xl font-semibold app-heading">
            <i class="fas fa-check-circle app-success-text"></i> Welcome
        </h1>
        <p class="mt-1 text-sm app-muted">Your account has been created successfully.</p>
    </div>

    <div class="p-5">
        <div class="rounded-md border app-alert-success px-4 py-3 text-sm">
            You are ready to start learning with us.
        </div>
        <p class="mt-5 text-sm app-muted">
            Browse courses, earn certificates, and join the community.
        </p>
        <div class="mt-5 flex flex-wrap gap-2 border-t app-border pt-5">
            <a href="{% url 'course_list' %}" class="primer-button">
                <i class="fas fa-rocket"></i> Start Learning
            </a>
        </div>
    </div>
</section>
{% endblock %}
