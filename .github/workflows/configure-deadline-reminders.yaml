name: Configure Deadline Reminders

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "CMP environment to schedule"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      scheduler_role_arn:
        description: "Optional IAM role ARN trusted by scheduler.amazonaws.com"
        required: false
        type: string
      schedule_expression:
        description: "EventBridge schedule expression"
        required: true
        default: "rate(1 hour)"
        type: string
      schedule_name:
        description: "Optional schedule name override"
        required: false
        type: string

jobs:
  configure:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure deadline reminder schedule
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          SCHEDULER_ROLE_ARN: ${{ inputs.scheduler_role_arn }}
          SCHEDULE_EXPRESSION: ${{ inputs.schedule_expression }}
          SCHEDULE_NAME: ${{ inputs.schedule_name }}
        run: bash deploy/schedule_deadline_reminders.sh "${{ inputs.environment }}"
